! FRR configuration for r1 - single BGP session test
! 1 interface in default VRF
! 1 eBGP session to r2

hostname r1
!
! Loopback interface
interface lo
 ip address 192.168.1.1/32
!
! Interface configuration (in default VRF)
interface r1-eth0
 ip address 10.1.1.1/30
 no shutdown
!
! BGP configuration (default VRF) - AS 65001
router bgp 65001
 bgp router-id 192.168.1.1
 timers bgp 10 30
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! Neighbor to r2
 neighbor 10.1.1.2 remote-as 65002
 !
 address-family ipv4 unicast
  redistribute sharp
  ! Activate neighbor
  neighbor 10.1.1.2 activate
!
! Line vty configuration
line vty
!
end 