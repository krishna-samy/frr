! FRR configuration for r2 - single BGP session test
! 1 interface in default VRF
! 1 eBGP session to r1

hostname r2
!
! Loopback interface
interface lo
 ip address 192.168.2.2/32
!
! Interface configuration (in default VRF)
interface r2-eth0
 ip address 10.1.1.2/30
 no shutdown
!
! BGP configuration (default VRF) - AS 65002
router bgp 65002
 bgp router-id 192.168.2.2
 timers bgp 10 30
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! Neighbor to r1
 neighbor 10.1.1.1 remote-as 65001
 !
 address-family ipv4 unicast
  redistribute sharp
  ! Activate neighbor
  neighbor 10.1.1.1 activate
!
! Line vty configuration
line vty
!
end 